version: '3.8'

services:
  # ── Atlas Backend (FastAPI + Celery beat) ──
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      redis:
        condition: service_started
      qdrant:
        condition: service_healthy
    volumes:
      - ./backend/training:/app/training
      - ./sessions:/app/sessions
    restart: unless-stopped

  # ── Atlas Frontend (React + Vite) ──
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis (Celery broker + cache) ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Celery Worker ──
  celery_worker:
    build: ./backend
    command: celery -A workers.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./backend/training:/app/training
      - ./sessions:/app/sessions
    restart: unless-stopped

  # ── Qdrant Vector Database ──
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
